# Netlify-konfiguration för Next.js på Netlifys runtime (INTE längre statisk export).
# @netlify/plugin-nextjs bygger serverfunktioner för /api-rutter och dynamiska sidor,
# men förrenderar/cachar fortfarande statiska sidor så marknadssajten förblir snabb.
#
# Miljövariabler (Supabase, Resend, APP_BASE_URL m.fl.) sätts under
# Site settings -> Environment variables i Netlify – ALDRIG i git. Se README.
[build]
  command = "npm run build"
  # Next.js-runtimen publicerar från .next (inte längre out/).
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Officiell Next.js-runtime för Netlify (serverfunktioner, ISR, image-hantering).
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Säkerhets- och prestandaheaders för alla sidor.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Långtidscache för statiska assets (Next.js hashar filnamn -> säkert att cacha hårt).
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cacha self-hosted typsnitt hårt.
[[headers]]
  for = "/_next/static/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
